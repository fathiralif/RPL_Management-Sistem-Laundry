<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- machine body -->
  <rect x="10" y="20" width="100" height="90" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <!-- control panel top -->
  <rect x="10" y="20" width="100" height="22" rx="12" fill="#2563EB"/>
  <rect x="10" y="32" width="100" height="10" fill="#2563EB"/>
  <!-- control dots -->
  <circle cx="30" cy="31" r="5" fill="#93C5FD"/>
  <circle cx="50" cy="31" r="5" fill="#BFDBFE"/>
  <circle cx="90" cy="31" r="4" fill="#60A5FA"/>
  <circle cx="103" cy="31" r="4" fill="#93C5FD"/>
  <!-- drum circle -->
  <circle cx="60" cy="75" r="32" fill="white" stroke="#BFDBFE" stroke-width="2.5"/>
  <circle cx="60" cy="75" r="24" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1.5"/>
  <!-- drum blades -->
  <line x1="60" y1="51" x2="60" y2="99" stroke="#93C5FD" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="36" y1="75" x2="84" y2="75" stroke="#93C5FD" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="43" y1="58" x2="77" y2="92" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="77" y1="58" x2="43" y2="92" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- drum center -->
  <circle cx="60" cy="75" r="7" fill="#2563EB"/>
  <circle cx="60" cy="75" r="3" fill="#93C5FD"/>
  <!-- door handle -->
  <rect x="73" y="73" width="12" height="4" rx="2" fill="#93C5FD"/>
  <!-- bottom panel -->
  <rect x="18" y="105" width="18" height="4" rx="2" fill="#BFDBFE"/>
  <rect x="42" y="105" width="18" height="4" rx="2" fill="#BFDBFE"/>
  <rect x="66" y="105" width="18" height="4" rx="2" fill="#BFDBFE"/>
</svg>
